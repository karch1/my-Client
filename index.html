<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB관리 메모장</title>
    <style>
        /* 기본 스타일 */
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            font-size: 13px;
            color: #333;
        }

        /* 상단 입력 및 검색 패널 */
        .input-panel {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .input-grid input, .input-grid select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 12px;
        }

        /* 검색 바 */
        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: #eef2f7;
            border-radius: 8px;
        }
        .search-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .add-btn { background-color: #409eff; color: white; flex: 2; min-width: 120px; }
        .backup-btn { background-color: #67c23a; color: white; }
        .restore-btn { background-color: #e6a23c; color: white; }
        .reset-btn { background-color: #909399; color: white; }
        .btn:hover { opacity: 0.8; }

        /* 테이블 스타일 */
        .container {
            width: 100%;
            overflow-x: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-height: 600px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #495057;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* 정렬 드롭다운 스타일 */
        .sort-select {
            font-size: 10px;
            padding: 2px;
            margin-left: 5px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* 상태별 스타일 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            min-width: 60px;
        }
        
        .status-contractor { background-color: #e6f7ff; border-color: #91d5ff; color: #1890ff; }
        .status-cancel { background-color: #fff1f0; border-color: #ffa39e; color: #e63946; }
        .status-db { background-color: #f5f5f5; border-color: #d9d9d9; color: #8c8c8c; }
        .status-appointment { background-color: #f6ffed; border-color: #b7eb8f; color: #52c41a; }
        .status-success { background-color: #e6f7ff; border-color: #91d5ff; color: #1890ff; }
        .status-default { background-color: #ffffff; color: #333; }

        /* 행 강조 */
        .highlight-red { background-color: #fff8f8; color: #e63946 !important; font-weight: bold; }
        .highlight-gray { color: #8c8c8c !important; }
        .highlight-blue { background-color: #f0f9ff; }

        .memo-cell {
            max-width: 350px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            color: #666;
        }

        /* 모달 공통 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            width: 90%; max-width: 500px;
            background: white; border-radius: 15px;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .memo-edit-area {
            width: 100%; height: 120px; padding: 10px;
            margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px;
            box-sizing: border-box; font-family: inherit; font-size: 13px;
        }

        .option-list {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin-bottom: 15px;
        }
        .option-item {
            padding: 8px; text-align: center; border-radius: 6px;
            background: #f1f3f5; cursor: pointer; font-size: 11px;
            border: 1px solid transparent;
        }
        .option-item.selected {
            background: #409eff; color: white;
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="modal-overlay" id="noticeModal">
    <div class="modal-content" style="border-top: 4px solid #409eff;">
        <h2 style="margin-top:0; color:#333;">📢 업무 공지</h2>
        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; line-height: 1.6; font-size: 14px;">
            매월 초에 <strong>신계약 3종확인서</strong> 해야됩니다.<br>
            크롬 즐찾에 있고<br><br>
            <strong>아이디:</strong> YF10140<br>
            <strong>비번:</strong> mn10140*
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label style="cursor:pointer; font-size: 12px; color: #666;">
                <input type="checkbox" id="hideNotice"> 오늘 하루 띄우지 않음
            </label>
            <button class="btn add-btn" onclick="closeNotice()" style="flex:none; width:80px; padding:8px;">확인</button>
        </div>
    </div>
</div>

<div class="input-panel">
    <div style="font-weight: bold; margin-bottom: 10px; font-size: 16px;">DB 고객 관리</div>
    
    <div class="search-row">
        <span style="align-self: center; font-weight: bold;">데이터 검색:</span>
        <input type="text" id="searchInput" placeholder="고객명, 전화번호, 메모 내용으로 검색..." onkeyup="renderTable()">
    </div>

    <div class="input-grid">
        <input type="date" id="newDate">
        <input type="text" id="newName" placeholder="고객명">
        <input type="text" id="newPhone" placeholder="전화번호">
        <input type="text" id="newRegion" placeholder="지역">
        <input type="text" id="newCity" placeholder="시도/구군">
        <input type="text" id="newBirth" placeholder="생년월일">
        <select id="newGender">
            <option value="남">남</option>
            <option value="여">여</option>
        </select>
        <select id="newStatus">
            <option>약속잡음</option>
            <option>2차성공</option>
            <option>계약자</option>
            <option>부재</option>
            <option>보류</option>
            <option>취소</option>
            <option>취소(AS)</option>
        </select>
        <input type="text" id="newMemo" placeholder="메모/상담내용" style="grid-column: span 2;">
    </div>
    
    <div class="btn-row">
        <button class="btn add-btn" onclick="addNewRow()">새 데이터 추가</button>
        <button class="btn backup-btn" onclick="exportData()">JSON 백업 저장</button>
        <button class="btn restore-btn" onclick="document.getElementById('fileInput').click()">JSON 불러오기</button>
        <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
        <button class="btn reset-btn" onclick="resetToInitial()">기본값 초기화</button>
    </div>
</div>

<div class="container">
    <table>
        <thead>
            <tr>
                <th>
                    배분날짜
                    <select class="sort-select" id="dateSortSelect" onchange="sortData('date', this.value)">
                        <option value="none">정렬</option>
                        <option value="desc">최신순 ↓</option>
                        <option value="asc">과거순 ↑</option>
                    </select>
                </th>
                <th>고객명</th>
                <th>전화번호</th>
                <th>지역</th>
                <th>구군</th>
                <th>생년</th>
                <th>성별</th>
                <th>메모/상담내용</th>
                <th>
                    현황
                    <select class="sort-select" id="statusSortSelect" onchange="sortData('status', this.value)">
                        <option value="none">기본</option>
                        <option value="계약자">계약자</option>
                        <option value="2차성공">2차성공</option>
                        <option value="약속잡음">약속잡음</option>
                        <option value="부재">부재</option>
                        <option value="보류">보류</option>
                        <option value="취소">취소</option>
                        <option value="취소(AS)">취소(AS)</option>
                    </select>
                </th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <h3 id="modalTitle">정보 수정</h3>
        <textarea id="memoInput" class="memo-edit-area"></textarea>
        <div class="option-list" id="optionList"></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn add-btn" onclick="saveChanges()" style="flex:1">저장하기</button>
            <button class="btn reset-btn" onclick="closeModal()" style="flex:1">닫기</button>
        </div>
    </div>
</div>

<script>
    let customerData = [];
    let activeRowIndex = null;
    let selectedStatus = "";
    
    // 요청하신 현황 옵션
    const statuses = ['계약자', '2차성공', '약속잡음', '부재', '보류', '취소', '취소(AS)'];
    
    // 기본 정렬 우선순위
    const statusPriority = {
        '계약자': 0,
        '2차성공': 1,
        '약속잡음': 2,
        '부재': 3,
        '보류': 4,
        '취소': 5,
        '취소(AS)': 6
    };

    // 기존 데이터 원복
    const initialData = [
        { date: "2026-04-14", name: "박천용", phone: "010-4872-1405", region: "부산경남", city: "경남 사천시", birth: "1978-03-23", gender: "남", memo: "3~4건 정도 / 15~20만원 / 전화 오전 / 방문 금요일 / NC마트 인근 / 취소AS신청 함 -> 한달 지나서 안됨", status: "취소" },
        { date: "2026-04-29", name: "박순단", phone: "010-8867-0744", region: "부산경남", city: "부산 서구", birth: "1968-05-25", gender: "여", memo: "3~4건 / 20~30만원 / 평일 오후 2시 이후 자택근처 / 11:30 / 5월 6,8,11일 콜 부재 ", status: "부재" },
        { date: "2026-04-29", name: "박준영", phone: "010-4851-3778", region: "부산경남", city: "부산 수영구", birth: "1997-04-10", gender: "남", memo: "3~4건 / 20~30만원 / 금요일 오전 / 자택근처 / 5월 중순쯤 편함 / 5월 스캐줄 꽉차서 6월에 연락준다고 함", status: "2차성공" },
        { date: "2026-05-08", name: "김재명", phone: "010-9002-4051", region: "부산경남", city: "창원시 팔용동", birth: "1968-01-17", gender: "남", memo: "10만원 / 오후 4~5시 통화가능 / 방문 주말", status: "부재" },
        { date: "2026-05-08", name: "김해철", phone: "010-3783-9208", region: "부산경남", city: "부산 사직동", birth: "1963-06-20", gender: "남", memo: "1건~2건 / 5~10만원 / 신규보험상담 / 평일 오전 / 12:00 / 사직동 반도보라아파트 후문 GS에서 5/14일 오후 2시에 만나기로 함", status: "약속잡음" },
        { date: "2026-05-08", name: "안혜선", phone: "010-4596-7551", region: "부산경남", city: "부산 대정동", birth: "1984-12-00", gender: "여", memo: "1건~2건 / 20~30만원 / 자택근처 평일 / 주말 오전 / 전문가 일정조율 -> 안한다해서 AS신청 후 승인", status: "취소(AS)" },
        { date: "2026-04-30", name: "백현근", phone: "010-5659-6989", region: "경남김해", city: "율하동 모아미래도아파트 6단지 607동 803호", birth: "1988-08-09", gender: "남", memo: "운전자보험 25,000원 가입 -> 5월15일 안으로 암+뇌심주치 가입여부 확인", status: "계약자" },
        { date: "2026-05-08", name: "유미애", phone: "010-7701-3253", region: "경남통영", city: "가죽고랑 1길 21", birth: "1958-03-16", gender: "여", memo: "39,384삼성화재, 53,472동양생명 가입하심 보험금 청구 도와드렸음 ", status: "계약자" }
    ];

    window.onload = function() {
        checkNotice();
        document.getElementById('newDate').valueAsDate = new Date();
        const saved = localStorage.getItem('office_db_data');
        if (saved) {
            customerData = JSON.parse(saved);
        } else {
            customerData = JSON.parse(JSON.stringify(initialData));
            saveToLocal();
        }
        
        // 페이지 로드 시 배분날짜 과거순으로 정렬 (오래된 순 ↑)
        customerData.sort((a, b) => new Date(a.date) - new Date(b.date));
        document.getElementById('dateSortSelect').value = 'asc';
        
        renderTable();
        initModalOptions();
    };

    function checkNotice() {
        const hideUntil = localStorage.getItem('hideNoticeUntil');
        const now = new Date().getTime();
        if (!hideUntil || now > hideUntil) {
            document.getElementById('noticeModal').classList.add('active');
        }
    }

    function closeNotice() {
        if (document.getElementById('hideNotice').checked) {
            const expireDate = new Date().getTime() + (24 * 60 * 60 * 1000);
            localStorage.setItem('hideNoticeUntil', expireDate);
        }
        document.getElementById('noticeModal').classList.remove('active');
    }

    // 정렬 함수 수정
    function sortData(field, type) {
        if (type === 'none') {
            // 기본값 클릭 시 날짜 최신순으로 초기화
            customerData.sort((a,b) => new Date(b.date) - new Date(a.date));
            renderTable();
            return;
        }
        
        if (field === 'date') document.getElementById('statusSortSelect').value = 'none';
        if (field === 'status') document.getElementById('dateSortSelect').value = 'none';

        customerData.sort((a, b) => {
            if (field === 'date') {
                const valA = new Date(a.date);
                const valB = new Date(b.date);
                return type === 'asc' ? valA - valB : valB - valA;
            } else if (field === 'status') {
                // 특정 카테고리를 선택했을 때: 해당 카테고리가 상단에 오도록 정렬
                const target = type;
                if (a.status === target && b.status !== target) return -1;
                if (a.status !== target && b.status === target) return 1;
                
                // 나머지는 기존 우선순위 유지
                const valA = statusPriority[a.status] !== undefined ? statusPriority[a.status] : 99;
                const valB = statusPriority[b.status] !== undefined ? statusPriority[b.status] : 99;
                return valA - valB;
            }
        });
        renderTable();
    }

    function initModalOptions() {
        const container = document.getElementById('optionList');
        container.innerHTML = "";
        statuses.forEach(s => {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerText = s;
            div.onclick = () => {
                selectedStatus = s;
                Array.from(container.children).forEach(child => child.classList.remove('selected'));
                div.classList.add('selected');
            };
            container.appendChild(div);
        });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = "";

        customerData.forEach((item, index) => {
            if (searchTerm && !JSON.stringify(item).toLowerCase().includes(searchTerm)) return;

            const tr = document.createElement('tr');
            let sClass = "status-default";
            
            if (item.status === '계약자') { sClass = "status-contractor"; tr.className = "highlight-blue"; }
            else if (item.status === '약속잡음') sClass = "status-appointment";
            else if (item.status === '취소' || item.status === '취소(AS)') { sClass = "status-cancel"; tr.className = "highlight-red"; }
            else if (item.status === '2차성공') sClass = "status-success";
            else if (item.status === '부재' || item.status === '보류') sClass = "status-db";

            tr.innerHTML = `
                <td>${item.date}</td>
                <td><strong>${item.name}</strong></td>
                <td>${item.phone}</td>
                <td>${item.region}</td>
                <td>${item.city}</td>
                <td>${item.birth}</td>
                <td>${item.gender}</td>
                <td class="memo-cell" onclick="openEditModal(${index})">${item.memo}</td>
                <td style="cursor:pointer" onclick="openEditModal(${index})"><span class="status-badge ${sClass}">${item.status}</span></td>
                <td>
                    <button class="btn reset-btn" style="padding:4px 8px; font-size:10px;" onclick="deleteRow(${index})">삭제</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function addNewRow() {
        const newItem = {
            date: document.getElementById('newDate').value,
            name: document.getElementById('newName').value,
            phone: document.getElementById('newPhone').value,
            region: document.getElementById('newRegion').value,
            city: document.getElementById('newCity').value,
            birth: document.getElementById('newBirth').value,
            gender: document.getElementById('newGender').value,
            status: document.getElementById('newStatus').value,
            memo: document.getElementById('newMemo').value
        };
        if(!newItem.name) return alert("고객명은 필수입니다.");
        customerData.unshift(newItem);
        saveToLocal();
        renderTable();
        document.getElementById('newName').value = "";
        document.getElementById('newPhone').value = "";
        document.getElementById('newMemo').value = "";
        document.getElementById('newName').focus();
    }

    function saveToLocal() { localStorage.setItem('office_db_data', JSON.stringify(customerData)); }

    function exportData() {
        const dataStr = JSON.stringify(customerData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `DB_Backup_${new Date().toLocaleDateString()}.json`; link.click();
    }

    function importData(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                if (Array.isArray(data)) { customerData = data; saveToLocal(); renderTable(); alert("불러오기 완료"); }
            } catch (err) { alert("유효한 파일이 아닙니다."); }
        };
        reader.readAsText(file);
    }

    function openEditModal(index) {
        activeRowIndex = index;
        const item = customerData[index];
        document.getElementById('modalTitle').innerText = `${item.name}님 정보 수정`;
        document.getElementById('memoInput').value = item.memo;
        selectedStatus = item.status;
        const options = document.getElementById('optionList').children;
        Array.from(options).forEach(opt => opt.classList.toggle('selected', opt.innerText === selectedStatus));
        document.getElementById('modalOverlay').classList.add('active');
    }

    function saveChanges() {
        customerData[activeRowIndex].memo = document.getElementById('memoInput').value;
        customerData[activeRowIndex].status = selectedStatus;
        saveToLocal(); renderTable(); closeModal();
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

    function deleteRow(index) {
        if (confirm("정말 삭제하시겠습니까?")) {
            customerData.splice(index, 1); saveToLocal(); renderTable();
        }
    }

    function resetToInitial() {
        if (confirm("기본값으로 초기화하시겠습니까?")) {
            customerData = JSON.parse(JSON.stringify(initialData));
            saveToLocal(); renderTable();
        }
    }
</script>
</body>
</html>
