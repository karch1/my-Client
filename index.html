<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB관리 메모장</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="modal-overlay" id="noticeModal">
    <div class="modal-content" style="border-top: 4px solid #409eff;">
        <h2 style="margin-top:0; color:#333;">📢 업무 공지</h2>
        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; line-height: 1.6; font-size: 14px;">
            매월 초에 <strong>신계약 3종확인서</strong> 해야됩니다.<br>
            <strong>아이디:</strong> YF10140 | <strong>비번:</strong> mn10140*
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label style="cursor:pointer; font-size: 12px; color: #666;">
                <input type="checkbox" id="hideNotice"> 오늘 하루 띄우지 않음
            </label>
            <button class="btn add-btn" onclick="closeNotice()" style="flex:none; width:80px; padding:8px;">확인</button>
        </div>
    </div>
</div>

<div class="input-panel">
    <div style="font-weight: bold; margin-bottom: 10px; font-size: 16px;">DB 고객 관리</div>
    <div class="search-row">
        <span style="align-self: center; font-weight: bold;">데이터 검색:</span>
        <input type="text" id="searchInput" placeholder="고객명, 전화번호, 메모 내용으로 검색..." onkeyup="currentPage=1; renderTable()">
    </div>
    <div class="input-grid">
        <input type="date" id="newDate">
        <input type="text" id="newName" placeholder="고객명">
        <input type="text" id="newPhone" placeholder="전화번호" maxlength="13" oninput="formatPhone(this)">
        <input type="text" id="newRegion" placeholder="지역">
        <input type="text" id="newCity" placeholder="시도/구군">
        <input type="text" id="newBirth" placeholder="생년월일" maxlength="12" oninput="formatBirth(this)">
        <select id="newGender"><option value="남">남</option><option value="여">여</option></select>
        <select id="newStatus">
            <option>약속잡음</option><option>2차성공</option><option>계약자</option>
            <option>부재</option><option>보류</option><option>취소</option><option>취소(AS)</option>
        </select>
        <input type="text" id="newMemo" placeholder="최초 배분 메모/상담내용" style="grid-column: span 2;">
    </div>
    <div class="filter-tab-row">
        <button class="filter-btn active" onclick="setFilter('ALL'); setActive(this)">전체</button>
        <button class="filter-btn" onclick="setFilter('계약자'); setActive(this)">계약자</button>
        <button class="filter-btn" onclick="setFilter('2차성공'); setActive(this)">2차성공</button>
        <button class="filter-btn" onclick="setFilter('약속잡음'); setActive(this)">약속잡음</button>
        <button class="filter-btn" onclick="setFilter('부재'); setActive(this)">부재</button>
        <button class="filter-btn" onclick="setFilter('보류'); setActive(this)">보류</button>
    </div>
    <div class="btn-row">
        <button class="btn" onclick="googleLogin()" style="background:#222; color:white;">구글 로그인</button>
        <button class="btn" onclick="logout()" style="background:#999; color:white;">로그아웃</button>
        <button class="btn add-btn" onclick="addNewRow()">새 데이터 추가</button>
    </div>
</div>

<div class="container">
    <table>
        <thead>
            <tr>
                <th>배분날짜 <select class="sort-select" id="dateSortSelect" onchange="sortData('date', this.value)"><option value="none">정렬</option><option value="desc">최신순 ↓</option><option value="asc">과거순 ↑</option></select></th>
                <th>고객명</th><th>전화번호</th><th>지역</th><th>구군</th><th>생년</th><th style="min-width: 50px;">성별</th><th>최초 메모</th>
                <th>현황 <select class="sort-select" id="statusSortSelect" onchange="sortData('status', this.value)"><option value="none">기본</option><option value="계약자">계약자</option><option value="2차성공">2차성공</option><option value="약속잡음">약속잡음</option><option value="부재">부재</option><option value="보류">보류</option><option value="취소">취소</option><option value="취소(AS)">취소(AS)</option></select></th>
                <th style="min-width: 70px;">관리</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>
<div id="pagination" style="display:flex; justify-content:center; gap:6px; margin-top:15px; flex-wrap:wrap;"></div>

<div class="side-overlay" id="sideOverlay" onclick="closeSidePanel()"></div>
<div class="side-panel" id="sidePanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:2px solid #f0f2f5; padding-bottom:10px;">
        <h3 id="panelTitle" style="margin:0; color:#333; font-size:16px;">고객 상세 정보</h3>
        <div style="display:flex; gap:10px; align-items:center;">
            <button onclick="deleteFromPanel()" style="background:#ff4d4f; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:11px; font-weight:bold;">삭제</button>
            <button onclick="closeSidePanel()" style="background:none; border:none; font-size:20px; cursor:pointer; color:#999;">&times;</button>
        </div>
    </div>
    <div class="form-group"><label>배분날짜</label><input type="date" id="editDate"></div>
    <div class="form-group"><label>고객명</label><input type="text" id="editName"></div>
    <div class="form-group"><label>전화번호</label><input type="text" id="editPhone" maxlength="13" oninput="formatPhone(this)"></div>
    <div class="form-group"><label>지역</label><input type="text" id="editRegion"></div>
    <div class="form-group"><label>시도/구군</label><input type="text" id="editCity"></div>
    <div class="form-group"><label>생년월일</label><input type="text" id="editBirth" maxlength="12" oninput="formatBirth(this)"></div>
    <div class="form-group"><label>성별</label><select id="editGender"><option value="남">남</option><option value="여">여</option></select></div>
    <div class="form-group"><label>현황 상태</label><div class="option-list" id="optionList"></div></div>
    
    <div class="form-group">
        <label>✏️ 상담 메모 히스토리 (클릭 시 펼쳐짐)</label>
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <input type="text" id="newMemoTitle" placeholder="메모 제목 (예: 1차 통화, 보장분석)" style="flex: 1; margin-bottom: 0; padding: 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px;">
            <button class="btn add-btn" onclick="addCustomerMemo()" style="width: auto; padding: 0 15px; font-size: 13px; flex-shrink: 0;">메모 추가</button>
        </div>
        <textarea id="newMemoContent" class="memo-edit-area" placeholder="상세 상담 내용을 입력하세요" style="height: 60px; margin-bottom: 15px; box-sizing: border-box; width: 100%; padding: 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px; resize: none;"></textarea>
        
        <div id="sideMemoList" style="display: flex; flex-direction: column; gap: 12px; max-height: 280px; overflow-y: auto; padding-right: 5px;">
            </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px; padding-bottom:30px;">
        <button class="btn add-btn" onclick="saveChanges()" style="flex:1; padding:12px;">변화내역 저장</button>
        <button class="btn" onclick="closeSidePanel()" style="flex:1; background:#f1f3f5; color:#333; padding:12px;">닫기</button>
    </div>
</div>

<script type="module" src="js/script.js"></script>

</body>
</html>
